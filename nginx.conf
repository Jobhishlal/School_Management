server {
    listen 80;
    server_name brainnotss.ddns.net;

    root /var/www/html;
    index index.html;

    # 1. Frontend / Single Page Application
    location / {
        try_files $uri $uri/ /index.html;
    }

    # 2. API Proxy
    location /api/ {
        proxy_pass http://localhost:5000/; # Strips /api/ and forwards to /
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;
        
        # Explicitly forward the Authorization header
        proxy_set_header Authorization $http_authorization;
        proxy_pass_header Authorization;

        # Standard Proxy Headers
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # 3. Direct Socket.IO support (in case /api/ mapping has issues)
    location /socket.io/ {
        proxy_pass http://localhost:5000/socket.io/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "Upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }
}
